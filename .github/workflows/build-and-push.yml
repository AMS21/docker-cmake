name: Build and Push

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
      latest:
        required: true
        type: boolean
      latest_major:
        required: true
        type: boolean
      latest_minor:
        required: true
        type: boolean
      latest_patch:
        required: true
        type: boolean

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write

jobs:
  push_to_registry:
    name: Push (${{ inputs.tag }})
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v7

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          # list of Docker images to use as base name for tags
          images: |
            ams21/cmake
            ghcr.io/ams21/cmake
          flavor: |
            latest=${{ inputs.latest }}
            prefix=
            suffix=
          # generate Docker tags based on the following events/attributes
          tags: |
            type=raw,value=${{ inputs.tag }}
            type=pep440,pattern={{major}},value=${{ inputs.tag }},enable=${{ inputs.latest_major }}
            type=pep440,pattern={{major}}.{{minor}},value=${{ inputs.tag }},enable=${{ inputs.latest_minor }}
            type=pep440,pattern={{major}}.{{minor}}.{{patch}},value=${{ inputs.tag }},enable=${{ inputs.latest_patch }}

      - name: Docker Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ./
          build-args: "VERSION=${{ inputs.version }}"
          push: true
          platforms: "linux/386,linux/amd64"
          annotations: ${{ steps.meta.outputs.annotations }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest Docker Hub
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: index.docker.io/ams21/cmake
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attest GitHub Container Registry
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/ams21/cmake
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
